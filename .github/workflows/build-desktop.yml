name: Build desktop installers

# Runs on GitHub's own Windows and macOS machines, so you do not need either OS yourself.
# Trigger it two ways:
#   1. Push a version tag, e.g.  git tag v1.0.0 && git push origin v1.0.0   -> also attaches installers to a Release
#   2. Actions tab -> "Build desktop installers" -> Run workflow            -> installers land under Artifacts

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            flag: "--win"
            pattern: "dist-desktop/*.exe"
          - os: macos-latest
            flag: "--mac"
            pattern: "dist-desktop/*.dmg"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build installer
        run: npm run dist -- ${{ matrix.flag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: cno-reports-${{ matrix.os }}
          path: ${{ matrix.pattern }}

      - name: Attach installer to the Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.pattern }}
