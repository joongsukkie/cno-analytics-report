name: Refresh native analytics

on:
  schedule:
    - cron: "17 13 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Wake and refresh CNO native sync
        env:
          SYNC_URL: ${{ secrets.CNO_SYNC_SERVICE_URL }}
          CRON_SECRET: ${{ secrets.CNO_SYNC_CRON_SECRET }}
        run: |
          test -n "$SYNC_URL" && test -n "$CRON_SECRET"
          curl --fail --show-error --silent --retry 5 --retry-delay 15 \
            --request POST "${SYNC_URL%/}/v1/cron/sync" \
            --header "x-cron-secret: ${CRON_SECRET}"
